version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      ruby-dependencies:
          update-types:
            - "minor"
            - "patch"
    commit-message:
      prefix: "chore"
      include: "scope"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
